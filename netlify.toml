[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Forzar fetch nativo (Node 18+)
[build.environment]
  NODE_VERSION = "20"

# Redirección SPA (cualquier ruta no API → index.html)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
